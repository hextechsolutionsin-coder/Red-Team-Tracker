version: "3.9"

services:
  # -------------------------------------------------------------------------
  # PostgreSQL 16 database
  # -------------------------------------------------------------------------
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: redboard
      POSTGRES_USER: redboard
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redboard -d redboard"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # FastAPI / Uvicorn backend
  # -------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://redboard:changeme@db:5432/redboard}
      SESSION_SECRET: ${SESSION_SECRET}
      UPLOAD_DIR: ${UPLOAD_DIR:-/uploads}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      FRONTEND_PORT: ${FRONTEND_PORT:-80}
      API_PORT: ${API_PORT:-8000}
    volumes:
      - uploads:/uploads
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -------------------------------------------------------------------------
  # nginx — serves the vanilla JS frontend as static files
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
  uploads:
