##############################################################################
# Red Team Operations Tracker — nginx configuration
# Serves the static frontend and proxies /api/ to the FastAPI backend.
##############################################################################

server {
    listen 80;
    server_name _;

    # ---------------------------------------------------------------------------
    # Static frontend files
    # ---------------------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets directly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------------------------------------------------------------------------
    # Reverse-proxy all /api/ requests to the FastAPI backend
    # ---------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward cookies unchanged so session auth works
        proxy_pass_header  Set-Cookie;

        # Increase timeouts for long-running operations (PDF generation)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ---------------------------------------------------------------------------
    # Block direct HTTP access to /uploads — files are served only via /api/
    # ---------------------------------------------------------------------------
    location /uploads {
        deny all;
        return 403;
    }

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff   always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
}
